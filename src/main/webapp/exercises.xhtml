<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core"
	  xmlns:ui="jakarta.faces.facelets">

<h:head>
	<title>Übungskatalog</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

	<style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #050505;
            color: #f0f0f0;
            margin: 0;
            padding: 20px 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-circle {
            width: 44px;
            height: 44px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2em;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            background-color: rgba(255, 255, 255, 0.05);
            color: #f0f0f0;
        }
        .btn-circle:active { transform: scale(0.92); }
        .btn-circle:hover { background-color: rgba(255, 255, 255, 0.1); }

        .header h2 {
            margin: 0;
            font-size: 1.6em;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-align: center;
            flex: 1;
        }

        .section-label {
            color: #888888;
            font-weight: 800;
            margin: 30px 0 15px 0;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 1.5px;
            display: block;
            text-align: center;
        }

        /* --- ADMIN CARD (Formular) --- */
        .card {
            background-color: #121212;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.4s ease-out;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 500px) { .form-grid { flex-direction: row; } }

        .input-wrapper { display: flex; flex-direction: column; flex: 1; }

        .form-label {
            font-size: 0.75em; color: #888888; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
        }

        .dark-input {
            background-color: #0a0a0a; border: 1px solid #333; color: #ffffff; padding: 0 15px; min-height: 44px; border-radius: 12px; outline: none; transition: border-color 0.2s; box-sizing: border-box; width: 100%; font-size: 1em;
        }
        .dark-input:focus { border-color: #4facfe; }

        .btn-submit {
            width: 100%; min-height: 50px; margin-top: 10px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #050505; border: none; border-radius: 16px; font-size: 1.1em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 10px 20px rgba(79, 172, 254, 0.2);
        }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4); }

        /* --- NEU: CARD LISTE FÜR ÜBUNGEN --- */
        .exercise-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px;
        }

        .exercise-item {
            background-color: #121212;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: border-color 0.2s ease;
        }
        .exercise-item:hover { border-color: #4facfe; }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .exercise-title {
            font-size: 1.15em;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 4px;
            display: block;
        }

        .muscle-tag {
            color: #888888;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .exercise-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .media-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .link-badge {
            display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 50px; text-decoration: none; font-size: 0.7em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; background-color: rgba(255,255,255,0.05);
        }
        .link-badge.video { color: #28a745; }
        .link-badge.video:hover { background-color: #28a745; color: #050505; }
        .link-badge.gif { color: #4facfe; }
        .link-badge.gif:hover { background-color: #4facfe; color: #050505; }

        .action-buttons { display: flex; gap: 8px; justify-content: flex-end; }

        .btn-icon-small {
            width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; background: rgba(255,255,255,0.05); border: 1px solid transparent; cursor: pointer; transition: all 0.2s ease;
        }
        .btn-icon-small:active { transform: scale(0.9); }
        .btn-edit { color: #f0f0f0; }
        .btn-edit:hover { background-color: #1e1e1e; border-color: #4facfe; color: #4facfe; }
        .btn-delete { color: #ff5252; }
        .btn-delete:hover { background-color: rgba(255,82,82,0.1); border-color: #ff5252; }

        /* --- TOAST NOTIFICATION --- */
        .toast-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; background-color: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); color: #28a745; padding: 15px 30px; border-radius: 50px; border: 1px solid rgba(40, 167, 69, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); list-style: none; font-weight: 800; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; opacity: 1; transition: opacity 0.5s ease-out; max-width: 90%; text-align: center; box-sizing: border-box; margin: 0;
        }
        .toast-notification li { margin: 0; }

        /* --- GLASSMORPHISM MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 15, 15, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; animation: fadeIn 0.2s;
        }
        .modal-box {
            background-color: #121212; padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); width: 100%; max-width: 400px; box-sizing: border-box;
        }
        .modal-title { font-size: 1.4em; color: #ffffff; font-weight: 800; margin-bottom: 25px; text-align: center;}

        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn-modal-cancel, .btn-modal-save {
            flex: 1; min-height: 48px; border-radius: 12px; font-weight: 800; cursor: pointer; border: none; font-size: 1em; transition: all 0.2s;
        }
        .btn-modal-cancel { background: rgba(255, 255, 255, 0.05); color: #f0f0f0; }
        .btn-modal-cancel:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-modal-save { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #050505; }
        .btn-modal-save:active { transform: scale(0.96); }

        /* Empty State */
        .empty-state { text-align: center; padding: 40px; color: #888888; font-style: italic; background: #121212; border-radius: 24px; border: 1px dashed #333; }
	</style>
</h:head>

<h:body>
	<div class="container">

		<h:messages globalOnly="true" styleClass="toast-notification" id="toastMsg"/>

		<div class="header">
			<h:link outcome="index.xhtml" styleClass="btn-circle" title="Zurück">
				❮
			</h:link>
			<h2>Übungen</h2>
			<div style="width: 44px;"></div>
		</div>

		<h:panelGroup rendered="#{userSession.loggedInAthlete.admin}">
			<div class="card">
				<h:form>
					<div class="form-grid">
						<div class="input-wrapper">
							<h:outputLabel value="Name der Übung" styleClass="form-label"/>
							<h:inputText value="#{exerciseController.newExercise.name}" required="true" requiredMessage="Name fehlt" styleClass="dark-input"/>
						</div>
						<div class="input-wrapper">
							<h:outputLabel value="Zielmuskel" styleClass="form-label"/>
							<h:inputText value="#{exerciseController.newExercise.targetMuscle}" styleClass="dark-input"/>
						</div>
					</div>

					<div class="form-grid">
						<div class="input-wrapper">
							<h:outputLabel value="Video Link" styleClass="form-label"/>
							<h:inputText value="#{exerciseController.newExercise.videoLink}" styleClass="dark-input" f:passThroughAttribute="placeholder" f:passThroughValue="YouTube URL..."/>
						</div>
						<div class="input-wrapper">
							<h:outputLabel value="Gif Link" styleClass="form-label"/>
							<h:inputText value="#{exerciseController.newExercise.gifUrl}" styleClass="dark-input" f:passThroughAttribute="placeholder" f:passThroughValue=".gif URL..."/>
						</div>
					</div>

					<h:commandButton value="Speichern" action="#{exerciseController.createExercise}" styleClass="btn-submit"/>
				</h:form>
			</div>
		</h:panelGroup>

		<span class="section-label">Katalog (#{exerciseController.allExercises.size()} Einträge)</span>

		<h:form id="exerciseListForm">
			<h:panelGroup layout="block" styleClass="exercise-list" rendered="#{not empty exerciseController.allExercises}">

				<ui:repeat value="#{exerciseController.allExercises}" var="ex">
					<div class="exercise-item">
						<div class="exercise-header">
							<div>
								<span class="exercise-title">#{ex.name}</span>
								<span class="muscle-tag">#{ex.targetMuscle}</span>
							</div>
						</div>

						<div class="exercise-footer">
							<div class="media-links">
								<h:panelGroup rendered="#{not empty ex.videoLink}">
									<h:outputLink value="#{ex.videoLink}" target="_blank" styleClass="link-badge video">▶ Video</h:outputLink>
								</h:panelGroup>
								<h:panelGroup rendered="#{not empty ex.gifUrl}">
									<h:outputLink value="#{ex.gifUrl}" target="_blank" styleClass="link-badge gif">👾 Gif</h:outputLink>
								</h:panelGroup>
							</div>

							<h:panelGroup styleClass="action-buttons" rendered="#{userSession.loggedInAthlete.admin}">
								<h:commandLink action="#{exerciseController.prepareEdit(ex)}" styleClass="btn-icon-small btn-edit" title="Bearbeiten">
									✏️
									<f:ajax render=":editModalGroup"/>
								</h:commandLink>

								<h:commandLink action="#{exerciseController.deleteExercise(ex.id)}" styleClass="btn-icon-small btn-delete" title="Löschen" onclick="return confirm('Übung wirklich löschen?');">
									🗑️
									<f:ajax render="@form :toastMsg"/>
								</h:commandLink>
							</h:panelGroup>
						</div>
					</div>
				</ui:repeat>

			</h:panelGroup>
		</h:form>

		<h:panelGroup rendered="#{empty exerciseController.allExercises}">
			<div class="empty-state">
				Noch keine Übungen. Leg los und erstell die Erste!
			</div>
		</h:panelGroup>

	</div>

	<h:panelGroup id="editModalGroup">
		<h:panelGroup rendered="#{exerciseController.exerciseToEdit != null}" layout="block" styleClass="modal-overlay">
			<h:form>
				<div class="modal-box">
					<div class="modal-title">Übung bearbeiten</div>

					<div class="input-wrapper" style="margin-bottom: 15px;">
						<h:outputLabel value="Name der Übung" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.name}" required="true" styleClass="dark-input"/>
					</div>

					<div class="input-wrapper" style="margin-bottom: 15px;">
						<h:outputLabel value="Zielmuskel" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.targetMuscle}" styleClass="dark-input"/>
					</div>

					<div class="input-wrapper" style="margin-bottom: 15px;">
						<h:outputLabel value="Video Link" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.videoLink}" styleClass="dark-input"/>
					</div>

					<div class="input-wrapper" style="margin-bottom: 25px;">
						<h:outputLabel value="Gif Link" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.gifUrl}" styleClass="dark-input"/>
					</div>

					<div class="modal-actions">
						<h:commandButton value="Abbrechen" action="#{exerciseController.cancelEdit()}" styleClass="btn-modal-cancel" immediate="true">
							<f:ajax render=":editModalGroup"/>
						</h:commandButton>
						<h:commandButton value="Speichern" action="#{exerciseController.saveEdit()}" styleClass="btn-modal-save">
							<f:ajax execute="@form" render=":exerciseListForm :editModalGroup :toastMsg"/>
						</h:commandButton>
					</div>
				</div>
			</h:form>
		</h:panelGroup>
	</h:panelGroup>

	<script>
        window.onload = function() {
            var toast = document.querySelector('.toast-notification');
            if (toast) {
                setTimeout(function() {
                    toast.style.opacity = '0';
                    setTimeout(function() {
                        toast.style.display = 'none';
                    }, 500);
                }, 2000);
            }
        };
	</script>

</h:body>
</html>
