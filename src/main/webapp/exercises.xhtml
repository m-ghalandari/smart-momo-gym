<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Übungskatalog</title>
    <style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0a0a0a; /* Deep Black */
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        /* CONTAINER */
        .content-container {
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        /* HEADER */
        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        h2 { margin: 0; font-size: 1.5em; color: white; }

        h3 {
            color: #888;
            font-weight: 600;
            margin-top: 40px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1.5px;
            text-align: center;
        }

        /* CARD */
        .card {
            background-color: #161616;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* FORMULAR GRID */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .input-wrapper { display: flex; flex-direction: column; }

        .form-label {
            font-size: 0.7em;
            color: #888;
            margin-bottom: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .dark-input {
            background-color: #212121;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }

        .dark-input:focus { border-color: #4facfe; }

        /* BUTTON */
        .btn-submit {
            width: auto;
            min-width: 200px;
            display: block;
            margin: 20px auto 0 auto;
            padding: 12px 30px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .back-link {
            color: #888;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
            font-size: 0.9em;
        }
        .back-link:hover { color: #fff; }

        /* TABLE */
        .modern-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .modern-table th {
            text-align: left;
            color: #666;
            text-transform: uppercase;
            font-size: 0.7em;
            letter-spacing: 1px;
            padding: 0 15px 5px 15px;
        }

        .modern-table td {
            background-color: #1a1a1a;
            padding: 15px;
            color: #ddd;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            vertical-align: middle;
        }

        .modern-table td:first-child {
            border-left: 1px solid #333;
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
            font-weight: bold;
            color: white;
        }

        .modern-table td:last-child {
            border-right: 1px solid #333;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            text-align: right;
        }

        .modern-table tr:hover td {
            background-color: #222;
            border-color: #444;
            transform: translateY(-1px);
            transition: all 0.2s;
        }

        .link-badge {
            display: inline-block;
            padding: 4px 10px;
            background-color: #252525;
            color: #4facfe;
            border-radius: 15px;
            text-decoration: none;
            font-size: 0.75em;
            font-weight: 600;
            transition: background 0.2s;
        }
        .link-badge:hover { background-color: #4facfe; color: black; }

        .btn-delete-icon {
            color: #ff6b6b;
            text-decoration: none;
            font-size: 1.1em;
            opacity: 0.7;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-delete-icon:hover { opacity: 1; transform: scale(1.2); }

        .muscle-tag { color: #888; font-style: italic; font-size: 0.9em; }

        /* --- TOAST NOTIFICATION (POPUP) --- */
        .toast-notification {
            position: fixed; /* Schwebt über allem */
            top: 20px;       /* Abstand von oben */
            left: 50%;       /* Horizontal zentriert */
            transform: translateX(-50%); /* Exakte Mitte */
            z-index: 9999;   /* Immer ganz oben */

            background-color: #252525;
            color: #4caf50; /* Standard Grün (wird oft durch JSF Info überschrieben) */
            padding: 15px 30px;
            border-radius: 50px; /* Pill Shape */
            border: 1px solid #4caf50;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);

            list-style: none; /* Keine Punkte */
            font-weight: bold;
            font-size: 1rem;

            /* Animation */
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }

        /* Falls es ein Fehler ist (JSF rendert Fehler oft gelb/rot in messages) */
        .toast-notification li { margin: 0; }
    </style>
</h:head>

<h:body>
    <h:messages globalOnly="true" styleClass="toast-notification" id="toastMsg"/>

    <div class="content-container">

        <div class="header-bar">
            <div>
                <h:link value="← Zurück" outcome="index.xhtml" styleClass="back-link"/>
            </div>
            <h2>Übungen</h2>
            <div style="width: 60px;"></div>
        </div>

        <div class="card">
            <h:form>
                <div class="form-grid">
                    <div class="input-wrapper">
                        <h:outputLabel value="Name der Übung" styleClass="form-label"/>
                        <h:inputText value="#{exerciseController.newExercise.name}"
                                     required="true"
                                     requiredMessage="Name fehlt"
                                     styleClass="dark-input"/>
                    </div>
                    <div class="input-wrapper">
                        <h:outputLabel value="Zielmuskel" styleClass="form-label"/>
                        <h:inputText value="#{exerciseController.newExercise.targetMuscle}"
                                     styleClass="dark-input"/>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="input-wrapper">
                        <h:outputLabel value="Video Link" styleClass="form-label"/>
                        <h:inputText value="#{exerciseController.newExercise.videoLink}"
                                     styleClass="dark-input"
                                     f:passThroughAttribute="placeholder" f:passThroughValue="YouTube URL..."/>
                    </div>
                    <div class="input-wrapper">
                        <h:outputLabel value="Gif Link" styleClass="form-label"/>
                        <h:inputText value="#{exerciseController.newExercise.gifUrl}"
                                     styleClass="dark-input"
                                     f:passThroughAttribute="placeholder" f:passThroughValue=".gif URL..."/>
                    </div>
                </div>

                <h:commandButton value="Speichern"
                                 action="#{exerciseController.createExercise}"
                                 styleClass="btn-submit"/>
            </h:form>
        </div>

        <h3>Katalog (#{exerciseController.allExercises.size()} Einträge)</h3>

        <h:form id="exerciseListForm">

            <h:dataTable value="#{exerciseController.allExercises}" var="ex"
                         styleClass="modern-table"
                         rendered="#{not empty exerciseController.allExercises}">

                <h:column>
                    <f:facet name="header">Name</f:facet>
                    #{ex.name}
                </h:column>

                <h:column>
                    <f:facet name="header">Muskel</f:facet>
                    <span class="muscle-tag">#{ex.targetMuscle}</span>
                </h:column>

                <h:column>
                    <f:facet name="header">Medien</f:facet>
                    <h:panelGroup rendered="#{not empty ex.videoLink}">
                        <h:outputLink value="#{ex.videoLink}" target="_blank" styleClass="link-badge" style="margin-right: 5px;">
                            Video
                        </h:outputLink>
                    </h:panelGroup>

                    <h:panelGroup rendered="#{not empty ex.gifUrl}">
                        <h:outputLink value="#{ex.gifUrl}" target="_blank" styleClass="link-badge">
                            Gif
                        </h:outputLink>
                    </h:panelGroup>
                </h:column>

                <h:column>
                    <f:facet name="header"></f:facet>
                    <h:commandLink
                            action="#{exerciseController.deleteExercise(ex.id)}"
                            styleClass="btn-delete-icon"
                            title="Löschen"
                            onclick="return confirm('Übung wirklich löschen?');">
                        🗑️
                    </h:commandLink>
                </h:column>

            </h:dataTable>
        </h:form>

        <h:panelGroup rendered="#{empty exerciseController.allExercises}">
            <div style="text-align: center; padding: 40px; color: #555;">
                Noch keine Übungen. Leg los und erstell die Erste!
            </div>
        </h:panelGroup>

    </div>

    <script>
        // Diese Funktion läuft, wenn die Seite geladen wird
        window.onload = function() {
            var toast = document.querySelector('.toast-notification');

            // Wenn eine Nachricht existiert (JSF rendert die Liste nur bei Inhalt)
            if (toast) {
                // Warte 1 Sekunde (1000 ms)
                setTimeout(function() {
                    // Starte Fade-Out
                    toast.style.opacity = '0';

                    // Nach dem Fade (0.5s CSS Transition) das Element ganz entfernen
                    setTimeout(function() {
                        toast.style.display = 'none';
                    }, 500);

                }, 1000); // 1 Sekunde sichtbar
            }
        };
    </script>

</h:body>
</html>
