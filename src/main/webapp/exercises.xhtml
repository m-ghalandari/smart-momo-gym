<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core"
	  xmlns:ui="jakarta.faces.facelets">

<h:head>
	<title>Übungskatalog</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }

        .header-bar { padding: 20px; width: 100%; box-sizing: border-box; position: absolute; top: 0; left: 0; z-index: 10; }
        .back-link { color: #888; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: color 0.2s; font-size: 1rem; }
        .back-link:hover { color: #fff; }

        .content-container { max-width: 700px; margin: 0 auto; width: 100%; padding-top: 80px; padding-bottom: 40px; padding-left: 20px; padding-right: 20px; box-sizing: border-box; }

        h2 { text-align: center; margin: 0 0 30px 0; font-size: 1.8em; color: white; }
        h3 { color: #888; font-weight: 600; margin-top: 40px; margin-bottom: 15px; text-transform: uppercase; font-size: 0.85em; letter-spacing: 1.5px; text-align: center; }

        .card { background-color: #161616; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; animation: fadeIn 0.4s ease-out; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-wrapper { display: flex; flex-direction: column; }
        .form-label { font-size: 0.7em; color: #888; margin-bottom: 6px; font-weight: bold; text-transform: uppercase; }

        .dark-input { background-color: #212121; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; outline: none; transition: border-color 0.2s; box-sizing: border-box; width: 100%; }
        .dark-input:focus { border-color: #4facfe; }

        .btn-submit { width: auto; min-width: 200px; display: block; margin: 20px auto 0 auto; padding: 12px 30px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #000; border: none; border-radius: 30px; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-sizing: border-box; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 10px; }
        .modern-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 550px; }
        .modern-table th { text-align: left; color: #666; text-transform: uppercase; font-size: 0.7em; letter-spacing: 1px; padding: 0 15px 5px 15px; white-space: nowrap; }
        .modern-table td { background-color: #1a1a1a; padding: 15px; color: #ddd; border-top: 1px solid #333; border-bottom: 1px solid #333; vertical-align: middle; }
        .modern-table td:first-child { border-left: 1px solid #333; border-top-left-radius: 8px; border-bottom-left-radius: 8px; font-weight: bold; color: white; }
        .modern-table td:last-child { border-right: 1px solid #333; border-top-right-radius: 8px; border-bottom-right-radius: 8px; text-align: right; white-space: nowrap; }
        .modern-table tr:hover td { background-color: #222; border-color: #444; transform: translateY(-1px); transition: all 0.2s; }

        .link-badge { display: inline-block; padding: 4px 10px; background-color: #252525; color: #4facfe; border-radius: 15px; text-decoration: none; font-size: 0.75em; font-weight: 600; transition: background 0.2s; margin-bottom: 4px; }
        .link-badge:hover { background-color: #4facfe; color: black; }

        .action-buttons { display: flex; gap: 10px; justify-content: flex-end; align-items: center; }
        .btn-delete-icon { color: #ff6b6b; text-decoration: none; font-size: 1.1em; opacity: 0.7; background: transparent; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-delete-icon:hover { opacity: 1; transform: scale(1.2); }
        .btn-edit-icon { color: #ffc107; text-decoration: none; font-size: 1.1em; opacity: 0.7; background: transparent; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-edit-icon:hover { opacity: 1; transform: scale(1.2); }

        .muscle-tag { color: #888; font-style: italic; font-size: 0.9em; }

        /* TOAST NOTIFICATION */
        .toast-notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; background-color: #252525; color: #4caf50; padding: 15px 30px; border-radius: 50px; border: 1px solid #4caf50; box-shadow: 0 5px 20px rgba(0,0,0,0.5); list-style: none; font-weight: bold; font-size: 1rem; opacity: 1; transition: opacity 0.5s ease-out; max-width: 90%; text-align: center; box-sizing: border-box; }
        .toast-notification li { margin: 0; }

        /* MODAL STYLES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box; }
        .modal-box { background-color: #161616; padding: 25px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 15px 50px rgba(0,0,0,0.9); width: 100%; max-width: 400px; box-sizing: border-box; }
        .modal-title { font-size: 1.3em; color: #fff; margin-bottom: 20px; font-weight: bold; text-align: center; }
        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn-modal-cancel { flex: 1; background: transparent; border: 1px solid #444; color: #aaa; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-modal-cancel:hover { border-color: #666; color: #fff; }
        .btn-modal-save { flex: 1; background: #4facfe; color: #000; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-modal-save:hover { background: #3da0e6; transform: translateY(-2px); }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .content-container { padding-left: 15px; padding-right: 15px; padding-top: 60px; }
            .card { padding: 15px; }
            .btn-submit { width: 100%; }
            h2 { font-size: 1.5em; }
        }
	</style>
</h:head>

<h:body>
	<h:messages globalOnly="true" styleClass="toast-notification" id="toastMsg"/>

	<div class="header-bar">
		<h:link value="← Dashboard" outcome="index.xhtml" styleClass="back-link"/>
	</div>

	<div class="content-container">

		<h2>Übungen</h2>

		<h:panelGroup rendered="#{userSession.loggedInAthlete.admin}">
			<div class="card">
				<h:form>
					<div class="form-grid">
						<div class="input-wrapper">
							<h:outputLabel value="Name der Übung" styleClass="form-label"/>
							<h:inputText value="#{exerciseController.newExercise.name}" required="true" requiredMessage="Name fehlt" styleClass="dark-input"/>
						</div>
						<div class="input-wrapper">
							<h:outputLabel value="Zielmuskel" styleClass="form-label"/>
							<h:inputText value="#{exerciseController.newExercise.targetMuscle}" styleClass="dark-input"/>
						</div>
					</div>

					<div class="form-grid">
						<div class="input-wrapper">
							<h:outputLabel value="Video Link" styleClass="form-label"/>
							<h:inputText value="#{exerciseController.newExercise.videoLink}" styleClass="dark-input" f:passThroughAttribute="placeholder" f:passThroughValue="YouTube URL..."/>
						</div>
						<div class="input-wrapper">
							<h:outputLabel value="Gif Link" styleClass="form-label"/>
							<h:inputText value="#{exerciseController.newExercise.gifUrl}" styleClass="dark-input" f:passThroughAttribute="placeholder" f:passThroughValue=".gif URL..."/>
						</div>
					</div>

					<h:commandButton value="Speichern" action="#{exerciseController.createExercise}" styleClass="btn-submit"/>
				</h:form>
			</div>
		</h:panelGroup>

		<h3>Katalog (#{exerciseController.allExercises.size()} Einträge)</h3>

		<h:form id="exerciseListForm">
			<div class="table-responsive">
				<h:dataTable value="#{exerciseController.allExercises}" var="ex" styleClass="modern-table" rendered="#{not empty exerciseController.allExercises}">

					<h:column>
						<f:facet name="header">Name</f:facet>
						#{ex.name}
					</h:column>

					<h:column>
						<f:facet name="header">Muskel</f:facet>
						<span class="muscle-tag">#{ex.targetMuscle}</span>
					</h:column>

					<h:column>
						<f:facet name="header">Medien</f:facet>
						<h:panelGroup rendered="#{not empty ex.videoLink}">
							<h:outputLink value="#{ex.videoLink}" target="_blank" styleClass="link-badge" style="margin-right: 5px;">Video</h:outputLink>
						</h:panelGroup>
						<h:panelGroup rendered="#{not empty ex.gifUrl}">
							<h:outputLink value="#{ex.gifUrl}" target="_blank" styleClass="link-badge">Gif</h:outputLink>
						</h:panelGroup>
					</h:column>

					<h:column>
						<f:facet name="header"></f:facet>
						<h:panelGroup styleClass="action-buttons" rendered="#{userSession.loggedInAthlete.admin}">
							<h:commandLink action="#{exerciseController.prepareEdit(ex)}" styleClass="btn-edit-icon" title="Bearbeiten">
								✏️
								<f:ajax render=":editModalGroup"/>
							</h:commandLink>

							<h:commandLink action="#{exerciseController.deleteExercise(ex.id)}" styleClass="btn-delete-icon" title="Löschen" onclick="return confirm('Übung wirklich löschen?');">
								🗑️
								<f:ajax render="@form :toastMsg"/>
							</h:commandLink>
						</h:panelGroup>
					</h:column>

				</h:dataTable>
			</div>
		</h:form>

		<h:panelGroup rendered="#{empty exerciseController.allExercises}">
			<div style="text-align: center; padding: 40px; color: #555;">
				Noch keine Übungen. Leg los und erstell die Erste!
			</div>
		</h:panelGroup>

	</div>

	<h:panelGroup id="editModalGroup">
		<h:panelGroup rendered="#{exerciseController.exerciseToEdit != null}" layout="block" styleClass="modal-overlay">
			<h:form>
				<div class="modal-box">
					<div class="modal-title">Übung bearbeiten</div>

					<div class="input-wrapper" style="margin-bottom: 15px;">
						<h:outputLabel value="Name der Übung" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.name}" required="true" styleClass="dark-input"/>
					</div>

					<div class="input-wrapper" style="margin-bottom: 15px;">
						<h:outputLabel value="Zielmuskel" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.targetMuscle}" styleClass="dark-input"/>
					</div>

					<div class="input-wrapper" style="margin-bottom: 15px;">
						<h:outputLabel value="Video Link" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.videoLink}" styleClass="dark-input"/>
					</div>

					<div class="input-wrapper" style="margin-bottom: 25px;">
						<h:outputLabel value="Gif Link" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.gifUrl}" styleClass="dark-input"/>
					</div>

					<div class="modal-actions">
						<h:commandButton value="Abbrechen" action="#{exerciseController.cancelEdit()}" styleClass="btn-modal-cancel" immediate="true">
							<f:ajax render=":editModalGroup"/>
						</h:commandButton>
						<h:commandButton value="Speichern" action="#{exerciseController.saveEdit()}" styleClass="btn-modal-save">
							<f:ajax execute="@form" render=":exerciseListForm :editModalGroup :toastMsg"/>
						</h:commandButton>
					</div>
				</div>
			</h:form>
		</h:panelGroup>
	</h:panelGroup>

	<script>
        window.onload = function() {
            var toast = document.querySelector('.toast-notification');
            if (toast) {
                setTimeout(function() {
                    toast.style.opacity = '0';
                    setTimeout(function() {
                        toast.style.display = 'none';
                    }, 500);
                }, 2000); // Etwas länger anzeigen (2 Sekunden)
            }
        };
	</script>

</h:body>
</html>
