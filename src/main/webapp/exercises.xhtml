<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:o="omnifaces.ui"
	  xmlns:of="omnifaces.functions"
	  xmlns:f="jakarta.faces.core"
	  xmlns:ui="jakarta.faces.facelets">

<h:head>
	<title>Übungskatalog - Smart Momo Gym</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<link rel="manifest" href="#{request.contextPath}/manifest.json?v=2" />
	<h:outputStylesheet name="css/app.css" />

	<style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #050505;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* --- BACKGROUND GLOWS --- */
        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
        }
        .glow-1 { top: -100px; right: -100px; }
        .glow-2 { bottom: -100px; left: -100px; }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px 20px 80px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 35px;
            animation: fadeInDown 0.5s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-circle {
            width: 44px; height: 44px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 1.2em; transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f0f0f0;
        }
        .btn-circle:active { transform: scale(0.92); }
        .btn-circle:hover { background: rgba(255, 255, 255, 0.1); border-color: #4facfe; }

        h2 {
            margin: 0;
            font-size: 1.8em;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff, #aaaaaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            flex: 1;
            letter-spacing: 0.5px;
        }

        .section-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4facfe;
            font-weight: 800;
            margin: 40px 0 15px 5px;
            display: block;
        }

        /* --- GLASS CARD (Add Form) --- */
        .glass-card {
            background: rgba(18, 18, 18, 0.6);
            padding: 30px 25px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            box-sizing: border-box;
            animation: cardEntrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            margin-bottom: 10px;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 500px) { .form-grid { flex-direction: row; } }
        .input-wrapper { display: flex; flex-direction: column; flex: 1; }

        .form-label {
            font-size: 0.75em; color: #666; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding-left: 5px;
        }

        .dark-input {
            width: 100%; padding: 16px; background-color: rgba(5, 5, 5, 0.6); border: 1px solid #222; border-radius: 16px; font-size: 1em; color: #ffffff; box-sizing: border-box; transition: all 0.3s ease; outline: none;
        }
        .dark-input:focus { border-color: #4facfe; background-color: #000; box-shadow: 0 0 15px rgba(79, 172, 254, 0.1); }

        .btn-submit {
            width: 100%; min-height: 56px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #050505; border: none; border-radius: 16px; font-size: 1.1em; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 10px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 15px 30px rgba(79, 172, 254, 0.3); box-sizing: border-box;
        }
        .btn-submit:active { transform: scale(0.97); }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(79, 172, 254, 0.5); }

        /* --- EXERCISE LIST CARDS --- */
        .exercise-list { display: flex; flex-direction: column; gap: 15px; }

        .exercise-item {
            background: rgba(20, 20, 20, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .exercise-item:hover {
            background: rgba(30, 30, 30, 0.8);
            border-color: #4facfe;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .exercise-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .exercise-title { font-size: 1.25em; font-weight: 800; color: #ffffff; margin-bottom: 4px; display: block; }
        .muscle-tag { color: #888; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }

        .exercise-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }

        .media-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .link-badge {
            display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 50px; text-decoration: none; font-size: 0.7em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; background-color: rgba(255,255,255,0.05);
        }
        .link-badge.video { color: #28a745; background: rgba(40, 167, 69, 0.1); border: 1px solid transparent;}
        .link-badge.video:hover { background-color: #28a745; color: #050505; }
        .link-badge.gif { color: #4facfe; background: rgba(79, 172, 254, 0.1); border: 1px solid transparent;}
        .link-badge.gif:hover { background-color: #4facfe; color: #050505; }

        .action-buttons { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-action-small {
            width: 40px; height: 40px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; cursor: pointer; transition: 0.2s;
        }
        .btn-action-small:hover { border-color: #4facfe; transform: scale(1.1); }
        .btn-action-delete { color: #ff5252; }
        .btn-action-delete:hover { border-color: #ff5252; background: rgba(255, 82, 82, 0.1); }

        /* --- TOAST NOTIFICATION --- */
        .toast-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(15px); border: 1px solid #4facfe; color: #4facfe; padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); list-style: none; font-weight: 800; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; opacity: 1; transition: opacity 0.5s ease-out; max-width: 90%; text-align: center; box-sizing: border-box; margin: 0;
        }
        .toast-notification li { margin: 0; }

        /* --- MODAL STYLES (Fix für perfekte Zentrierung) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 99999; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; margin: 0; animation: fadeIn 0.3s ease;
        }
        .modal-box {
            background-color: #121212; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8); position: relative; margin: auto; animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .btn-danger-glass {
            background: rgba(255, 82, 82, 0.1); color: #ff5252; border: 1px solid rgba(255, 82, 82, 0.2); font-weight: 800; border-radius: 16px; padding: 15px; cursor: pointer; transition: 0.2s;
        }
        .btn-danger-glass:hover { background: rgba(255, 82, 82, 0.2); }

        .empty-state { text-align: center; padding: 50px 20px; color: #666; font-style: italic; background: rgba(20,20,20,0.4); border-radius: 24px; border: 1px dashed #333; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
	</style>
</h:head>

<h:body>
	<div class="bg-glow glow-1"></div>
	<div class="bg-glow glow-2"></div>

	<div class="container">

		<h:messages globalOnly="true" styleClass="toast-notification" id="toastMsg"/>

		<div class="header">
			<h:link outcome="index.xhtml" styleClass="btn-circle" title="Zurück">
				❮
			</h:link>
			<h2>Übungskatalog</h2>
			<div style="width: 44px;"></div>
		</div>

		<h:panelGroup rendered="#{userSession.loggedInAthlete.admin}" layout="block" styleClass="glass-card">
			<h:form>
				<div class="form-grid">
					<div class="input-wrapper">
						<h:outputLabel value="Name der Übung" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.newExercise.name}" required="true" requiredMessage="Name fehlt" styleClass="dark-input" f:passThroughAttribute="placeholder" f:passThroughValue="z.B. Bankdrücken"/>
					</div>
					<div class="input-wrapper">
						<h:outputLabel value="Zielmuskel" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.newExercise.targetMuscle}" styleClass="dark-input" f:passThroughAttribute="placeholder" f:passThroughValue="z.B. Brust"/>
					</div>
				</div>

				<div class="form-grid">
					<div class="input-wrapper">
						<h:outputLabel value="Video Link" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.newExercise.videoLink}" styleClass="dark-input" f:passThroughAttribute="placeholder" f:passThroughValue="YouTube URL..."/>
					</div>
					<div class="input-wrapper">
						<h:outputLabel value="Gif Link" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.newExercise.gifUrl}" styleClass="dark-input" f:passThroughAttribute="placeholder" f:passThroughValue=".gif URL..."/>
					</div>
				</div>

				<h:commandButton value="Übung Hinzufügen" action="#{exerciseController.createExercise}" styleClass="btn-submit"/>
			</h:form>
		</h:panelGroup>

		<h:panelGroup id="catalogCount" layout="block" styleClass="section-label">
			Katalog (#{exerciseController.allExercises.size()} Einträge)
		</h:panelGroup>

		<h:form id="exerciseListForm">
			<h:panelGroup layout="block" styleClass="exercise-list" rendered="#{not empty exerciseController.allExercises}">

				<ui:repeat value="#{exerciseController.allExercises}" var="ex">
					<div class="exercise-item">
						<div class="exercise-header">
							<div>
								<span class="exercise-title">#{ex.name}</span>
								<span class="muscle-tag">#{ex.targetMuscle}</span>
							</div>
						</div>

						<div class="exercise-footer">
							<div class="media-links">
								<h:panelGroup rendered="#{not empty ex.videoLink}">
									<h:outputLink value="#{ex.videoLink}" target="_blank" styleClass="link-badge video">▶ Video</h:outputLink>
								</h:panelGroup>
								<h:panelGroup rendered="#{not empty ex.gifUrl}">
									<h:outputLink value="#{ex.gifUrl}" target="_blank" styleClass="link-badge gif">👾 Gif</h:outputLink>
								</h:panelGroup>
							</div>

							<h:panelGroup styleClass="action-buttons" rendered="#{userSession.loggedInAthlete.admin}">
								<h:commandLink action="#{exerciseController.prepareEdit(ex)}" styleClass="btn-action-small" title="Bearbeiten">
									✏️
									<f:ajax render=":editModalGroup"/>
								</h:commandLink>

								<h:commandLink styleClass="btn-action-small btn-action-delete"
											   title="Löschen"
											   onclick="openConfirmModal(#{ex.id}, 'deleteExerciseCmd', 'Übung löschen?', 'Alle Logs dieser Übung werden ebenfalls gelöscht.'); return false;">
									🗑️
								</h:commandLink>
							</h:panelGroup>
						</div>
					</div>
				</ui:repeat>

			</h:panelGroup>
		</h:form>

		<h:panelGroup rendered="#{empty exerciseController.allExercises}">
			<div class="empty-state">
				Noch keine Übungen im Katalog. Leg los und erstell die Erste!
			</div>
		</h:panelGroup>

	</div> <h:panelGroup id="editModalGroup" layout="block">
	<h:panelGroup rendered="#{exerciseController.exerciseToEdit != null}" layout="block" styleClass="modal-overlay">
		<h:form>
			<div class="modal-box">
				<div style="margin-bottom: 25px; font-weight: 800; font-size: 1.4em; text-align: center; color: #fff;">Übung bearbeiten</div>

				<div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px;">
					<div>
						<h:outputLabel value="Name der Übung" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.name}" required="true" styleClass="dark-input"/>
					</div>

					<div>
						<h:outputLabel value="Zielmuskel" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.targetMuscle}" styleClass="dark-input"/>
					</div>

					<div>
						<h:outputLabel value="Video Link" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.videoLink}" styleClass="dark-input"/>
					</div>

					<div>
						<h:outputLabel value="Gif Link" styleClass="form-label"/>
						<h:inputText value="#{exerciseController.exerciseToEdit.gifUrl}" styleClass="dark-input"/>
					</div>
				</div>

				<div style="display: flex; gap: 10px;">
					<h:commandButton value="Abbrechen" action="#{exerciseController.cancelEdit()}" styleClass="btn-danger-glass" style="flex: 1; border-radius: 16px;" immediate="true">
						<f:ajax render=":editModalGroup"/>
					</h:commandButton>
					<h:commandButton value="Speichern" action="#{exerciseController.saveEdit()}" styleClass="btn-submit" style="flex: 1; margin-top: 0; min-height: 48px; border-radius: 16px;">
						<f:ajax execute="@form" render=":exerciseListForm :editModalGroup :toastMsg :catalogCount"/>
					</h:commandButton>
				</div>
			</div>
		</h:form>
	</h:panelGroup>
</h:panelGroup>

	<script>
        window.onload = function() {
            var toast = document.querySelector('.toast-notification');
            if (toast) {
                setTimeout(function() {
                    toast.style.opacity = '0';
                    setTimeout(function() {
                        toast.style.display = 'none';
                    }, 500);
                }, 2000);
            }
        };
	</script>

	<h:form style="display: none;">
		<h:commandScript name="deleteExerciseCmd"
						 action="#{exerciseController.deleteExercise(param.delId)}"
						 render=":exerciseListForm :toastMsg :catalogCount" />
	</h:form>

	<ui:include src="/WEB-INF/includes/confirmModal.xhtml" />

</h:body>
</html>
