<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core">

<h:head>
	<title>Athlet Registrieren</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* LOGO STYLE: Groß, Prominent und Responsive */
        .gym-logo {
            max-width: 500px; /* Groß für Laptops, wie das Kästchen */
            width: 100%;
            height: auto;
            margin-bottom: 40px; /* Großzügiger Abstand zur Karte */
            border-radius: 8px; /* Leicht abgerundete Ecken */
        }

        /* CARD STYLE: Rein funktionaler Bereich */
        .register-card {
            background-color: #161616;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.5s ease-out;
            box-sizing: border-box;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 1.8em;
            letter-spacing: -0.5px;
            text-align: center;
        }

        /* FORMULAR ELEMENTE */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85em;
            color: #b0b0b0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            background-color: #212121;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 16px;
            color: white;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.1);
        }

        /* BUTTON */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        .link-text { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9em; }
        .link-text:hover { color: #4facfe; }

        /* MESSAGES */
        .global-messages {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .global-messages li {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.85em;
            margin-top: 5px;
            display: block;
        }

        /* --- MOBILE OPTIMIERUNG --- */
        @media (max-width: 600px) {
            .register-card { padding: 25px; border-radius: 12px; }
            .gym-logo {
                max-width: 100%; /* Nimmt die volle Breite ein */
                margin-bottom: 25px; /* Etwas weniger Abstand */
            }
            h2 { font-size: 1.5em; margin-bottom: 20px; }
            .form-input { padding: 12px; }
            .btn-submit { padding: 15px; }
        }
	</style>
</h:head>

<h:body>
	<div class="main-content">

		<h:graphicImage name="images/logo.png" styleClass="gym-logo" alt="Smart Momo Gym Logo" />

		<div class="register-card">
			<h2>Registrieren</h2>

			<h:form>
				<h:messages globalOnly="true" styleClass="global-messages" />

				<div class="form-group">
					<h:outputLabel for="usernameInput" value="Benutzername" styleClass="form-label" />

					<h:inputText id="usernameInput"
								 value="#{athleteController.username}"
								 required="true"
								 requiredMessage="Bitte Namen eingeben."
								 styleClass="form-input"
								 f:passThroughAttribute="placeholder"
								 f:passThroughValue="Dein Name..." />

					<h:message for="usernameInput" styleClass="error-msg" />
				</div>

				<div class="form-group">
					<h:outputLabel for="passwordInput" value="Passwort" styleClass="form-label" />
					<h:inputSecret id="passwordInput"
								   value="#{athleteController.password}"
								   required="true"
								   requiredMessage="Bitte Passwort eingeben."
								   styleClass="form-input" />
					<h:message for="passwordInput" styleClass="error-msg" />
				</div>

				<h:commandButton value="Konto erstellen"
								 action="#{athleteController.register}"
								 styleClass="btn-submit" />

				<h:link value="Bereits ein Konto? Hier einloggen" outcome="login.xhtml" styleClass="link-text" />
			</h:form>
		</div>
	</div>
</h:body>
</html>
