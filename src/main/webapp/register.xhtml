<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:o="omnifaces.ui"
	  xmlns:of="omnifaces.functions"
	  xmlns:f="jakarta.faces.core">

<h:head>
	<title>Athlet Registrieren</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

	<link rel="icon" type="image/png" href="#{resource['images/icon.png']}" />
	<link rel="apple-touch-icon" href="#{resource['images/icon.png']}" />
	<link rel="manifest" href="#{request.contextPath}/manifest.json?v=2" />
	<meta name="theme-color" content="#050505" />

	<style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #050505;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* LOGO STYLE */
        .gym-logo {
            max-width: 400px;
            width: 100%;
            height: auto;
            margin-bottom: 40px;
            border-radius: 20px;
        }

        /* CARD STYLE */
        .register-card {
            background-color: #121212;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TYPOGRAFIE --- */
        h2 {
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 800;
            font-size: 0.75em;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- INPUTS BUTTONS --- */
        .form-input {
            width: 100%;
            padding: 16px;
            background-color: #0a0a0a;
            border: 1px solid #333;
            border-radius: 16px;
            font-size: 1em;
            color: #ffffff;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
            outline: none;
        }

        .form-input:focus { border-color: #4facfe; }

        .btn-submit {
            width: 100%;
            min-height: 56px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #050505;
            border: none;
            border-radius: 16px;
            font-size: 1.1em;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.2);
        }

        .btn-submit:active { transform: scale(0.96); }
        .btn-submit:hover {
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
            transform: translateY(-2px);
        }

        /* --- MESSAGES LINKS --- */
        .global-messages { list-style: none; padding: 0; margin-bottom: 25px; text-align: center; }
        .global-messages li {
            color: #ff5252;
            background: rgba(255, 82, 82, 0.1);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 82, 82, 0.3);
            font-weight: 800;
            font-size: 0.9em;
        }

        .error-msg {
            color: #ff5252;
            font-size: 0.8em;
            font-weight: 800;
            margin-top: 8px;
            display: block;
        }

        .link-text {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #888888;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 800;
            transition: color 0.2s;
        }
        .link-text:hover { color: #4facfe; }

        /* --- MOBILE OPTIMIERUNG --- */
        @media (max-width: 600px) {
            .main-content { padding: 15px; }
            .register-card { padding: 30px 20px; border-radius: 20px; }
            .gym-logo { margin-bottom: 30px; }
        }
	</style>
</h:head>

<h:body>
	<div class="main-content">

		<h:graphicImage name="images/logo.png" styleClass="gym-logo" alt="Smart Momo Gym Logo" />

		<div class="register-card">
			<h2>Registrieren</h2>

			<h:form>
				<h:messages globalOnly="true" styleClass="global-messages" />

				<div class="form-group">
					<h:outputLabel for="usernameInput" value="Benutzername" styleClass="form-label" />

					<h:inputText id="usernameInput"
								 value="#{athleteController.username}"
								 required="true"
								 requiredMessage="Bitte Namen eingeben."
								 styleClass="form-input"
								 f:passThroughAttribute="placeholder"
								 f:passThroughValue="Dein Name..." />

					<h:message for="usernameInput" styleClass="error-msg" />
				</div>

				<div class="form-group">
					<h:outputLabel for="passwordInput" value="Passwort" styleClass="form-label" />

					<h:inputSecret id="passwordInput"
								   value="#{athleteController.password}"
								   required="true"
								   requiredMessage="Bitte Passwort eingeben."
								   styleClass="form-input" />

					<h:message for="passwordInput" styleClass="error-msg" />
				</div>

				<h:commandButton value="Konto erstellen"
								 action="#{athleteController.register}"
								 styleClass="btn-submit" />

				<h:link value="Bereits ein Konto? Hier einloggen" outcome="login.xhtml" styleClass="link-text" />
			</h:form>
		</div>
	</div>
</h:body>
</html>
