<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Athleten Details</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
        }

        /* Navigations-Leiste oben links */
        .nav-header {
            margin-bottom: 20px;
        }

        /* Überschriften zentriert */
        h2, h3 {
            color: #ffffff;
            text-align: center;
            margin-top: 0;
        }

        h2 { margin-bottom: 5px; font-size: 2em; }
        h3 { color: #b0b0b0; font-weight: normal; margin-top: 0; margin-bottom: 30px;}

        /* BUTTONS */
        .btn-create {
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1em;
            transition: background-color 0.2s;
            display: inline-block;
        }

        .btn-create:hover {
            background-color: #34ce57;
        }

        /* PLAN CARDS */
        .plan-card {
            width: 100%;
            max-width: 600px;
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-left: auto;
            margin-right: auto;
            transition: transform 0.2s ease;
        }

        /* Kleiner Hover-Effekt für die Karte */
        .plan-card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }

        /* STATUS INDIKATOREN */
        .status-active { color: #4caf50; font-weight: bold; }
        .status-inactive { color: #b0b0b0; }

        /* NEU: KLICKBARER TITEL */
        .plan-name-link {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
        }

        .plan-name-link:hover {
            color: #64b5f6; /* Blau beim Drüberfahren */
            text-decoration: underline;
        }

        /* NEU: LÖSCHEN ICON BUTTON */
        .btn-icon-delete {
            color: #ff6b6b;
            background: transparent;
            border: 1px solid #ff6b6b;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1.2em;
            line-height: 1;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon-delete:hover {
            background-color: #dc3545;
            border-color: #dc3545;
            color: white;
            cursor: pointer;
        }

        /* Link zurück */
        .back-link {
            color: #64b5f6;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold;
        }
        .back-link:hover { text-decoration: underline; }

        /* Container für den Button unten */
        .action-container {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 50px;
        }
    </style>
</h:head>

<h:body>
    <h:messages showDetail="true" showSummary="true" style="color: #ff6b6b; list-style:none; text-align:center;"/>

    <h:panelGroup rendered="#{athleteDetailController.athlete != null}">

        <div class="nav-header">
            <h:link value="← Zurück zum Dashboard" outcome="index.xhtml" styleClass="back-link"/>
        </div>

        <h2>#{athleteDetailController.athlete.username}</h2>
        <h3>Trainingspläne</h3>

        <h:panelGroup rendered="#{empty athleteDetailController.athlete.trainingPlans}">
            <p style="color: #888; text-align: center;">Dieser Athlet hat noch keine Trainingspläne.</p>
        </h:panelGroup>

        <h:form>
            <ui:repeat value="#{athleteDetailController.athlete.trainingPlans}" var="plan">

                <div class="plan-card">

                    <div>
                        <h:link outcome="planEditor" styleClass="plan-name-link">
                            <f:param name="planId" value="#{plan.id}" />
                            #{plan.name}
                        </h:link>

                        <div style="font-size: 0.9em;">
                            Status:
                            <span class="#{plan.active ? 'status-active' : 'status-inactive'}">
                                #{plan.active ? 'AKTIV' : 'Inaktiv'}
                            </span>
                        </div>
                    </div>

                    <div>
                        <h:commandLink action="#{athleteDetailController.deletePlan(plan.id)}"
                                       styleClass="btn-icon-delete"
                                       title="Plan löschen"
                                       onclick="return confirm('Diesen Plan wirklich löschen?');">
                            🗑️
                        </h:commandLink>
                    </div>
                </div>
            </ui:repeat>
        </h:form>

        <div class="action-container">
            <h:link value="+ Neuer Trainingsplan"
                    outcome="/trainingPlan.xhtml"
                    styleClass="btn-create">
                <f:param name="athleteId" value="#{athleteDetailController.athlete.id}"/>
            </h:link>
        </div>

    </h:panelGroup>

    <h:panelGroup rendered="#{athleteDetailController.athlete == null}">
        <p style="color: #ff6b6b; text-align: center;">Kein Athlet geladen.</p>
        <div style="text-align: center; margin-top: 20px;">
            <h:link value="Zurück zum Dashboard" outcome="index.xhtml" styleClass="back-link"/>
        </div>
    </h:panelGroup>

</h:body>
</html>
