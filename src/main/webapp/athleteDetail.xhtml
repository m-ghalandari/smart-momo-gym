<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Athleten Details</title>
    <style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }

        .header-bar {
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .back-link {
            color: #888;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
            font-size: 1rem;
        }
        .back-link:hover { color: #fff; }

        .main-container {
            padding-top: 80px;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        h2 { color: #ffffff; text-align: center; margin-top: 0; margin-bottom: 5px; font-size: 2em; }
        h3 { color: #b0b0b0; font-weight: normal; margin-top: 0; margin-bottom: 30px; text-align: center;}

        /* BUTTONS */
        .btn-create {
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1em;
            transition: background-color 0.2s;
            display: inline-block;
        }
        .btn-create:hover { background-color: #34ce57; }

        /* PLAN CARDS */
        .plan-card {
            width: 100%;
            max-width: 600px;
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-left: auto;
            margin-right: auto;
            transition: transform 0.2s ease;
        }
        .plan-card:hover { border-color: #444; transform: translateY(-2px); }

        .status-active { color: #4caf50; font-weight: bold; }
        .status-inactive { color: #b0b0b0; }

        .plan-name-link {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
        }
        .plan-name-link:hover { color: #64b5f6; text-decoration: underline; }

        /* ACTION BUTTONS IN CARD */
        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1.2em;
            line-height: 1;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            cursor: pointer;
        }

        .btn-delete { border: 1px solid #ff6b6b; color: #ff6b6b; }
        .btn-delete:hover { background-color: #dc3545; border-color: #dc3545; color: white; }

        .btn-edit { border: 1px solid #ffc107; color: #ffc107; }
        .btn-edit:hover { background-color: #ffc107; color: black; }


        /* MODAL STYLES */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .modal-box {
            background-color: #1e1e1e; padding: 30px; border-radius: 12px;
            border: 1px solid #444; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 90%; max-width: 400px;
        }
        .modal-title { font-size: 1.2em; color: #4facfe; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .modal-input { width: 100%; padding: 10px; background: #2b2b2b; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-modal-cancel { background: transparent; border: 1px solid #666; color: #aaa; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
        .btn-modal-cancel:hover { border-color: #bbb; color: white; }
        .btn-modal-save { background-color: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-modal-save:hover { background-color: #0056b3; }

        .checkbox-list table { width: 100%; }
        .checkbox-list td { padding: 5px 0; }
        .checkbox-list label { margin-left: 8px; color: #ddd; cursor: pointer;}
        .checkbox-list input { accent-color: #007bff; }

        .action-container { text-align: center; margin-top: 30px; margin-bottom: 50px; }
    </style>
</h:head>

<h:body>
    <div class="header-bar">
        <h:link value="← Dashboard" outcome="index.xhtml" styleClass="back-link"/>
    </div>

    <div class="main-container">
        <h:messages showDetail="true" showSummary="true" style="color: #ff6b6b; list-style:none; text-align:center;"/>

        <h:form id="mainForm">
            <h:panelGroup rendered="#{athleteDetailController.athlete != null}">

                <h2>#{athleteDetailController.athlete.username}</h2>
                <h3>Trainingspläne</h3>

                <h:panelGroup rendered="#{empty athleteDetailController.athlete.trainingPlans}">
                    <p style="color: #888; text-align: center;">Dieser Athlet hat noch keine Trainingspläne.</p>
                </h:panelGroup>

                <ui:repeat value="#{athleteDetailController.athlete.trainingPlans}" var="plan">
                    <div class="plan-card">
                        <div>
                            <h:link outcome="planEditor" styleClass="plan-name-link">
                                <f:param name="planId" value="#{plan.id}" />
                                #{plan.name}
                            </h:link>

                            <div style="font-size: 0.9em;">
                                Status:
                                <span class="#{plan.active ? 'status-active' : 'status-inactive'}">
                                    #{plan.active ? 'AKTIV' : 'Inaktiv'}
                                </span>
                            </div>
                        </div>

                        <div class="card-actions">
                            <h:commandLink action="#{athleteDetailController.prepareEditPlan(plan)}"
                                           styleClass="btn-icon btn-edit"
                                           title="Plan bearbeiten">
                                ✏️
                                <f:ajax render=":editPlanModal" />
                            </h:commandLink>

                            <h:commandLink action="#{athleteDetailController.deletePlan(plan.id)}"
                                           styleClass="btn-icon btn-delete"
                                           title="Plan löschen"
                                           onclick="return confirm('Diesen Plan wirklich löschen?');">
                                🗑️
                            </h:commandLink>
                        </div>
                    </div>
                </ui:repeat>

                <div class="action-container">
                    <h:link value="+ Neuer Trainingsplan"
                            outcome="/trainingPlan.xhtml"
                            styleClass="btn-create">
                        <f:param name="athleteId" value="#{athleteDetailController.athlete.id}"/>
                    </h:link>
                </div>

            </h:panelGroup>
        </h:form>

        <h:panelGroup rendered="#{athleteDetailController.athlete == null}">
            <p style="color: #ff6b6b; text-align: center; margin-top: 50px;">Kein Athlet geladen.</p>
        </h:panelGroup>
    </div>

    <h:panelGroup id="editPlanModal">
        <h:panelGroup rendered="#{athleteDetailController.planToEdit != null}" layout="block" styleClass="modal-overlay">
            <h:form>
                <div class="modal-box">
                    <div class="modal-title">Plan bearbeiten</div>

                    <div style="margin-bottom: 15px;">
                        <label style="color:#aaa; font-size:0.8em; font-weight:bold; display:block; margin-bottom:5px;">Name des Plans</label>
                        <h:inputText value="#{athleteDetailController.newPlanName}" styleClass="modal-input" required="true" />
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="color:#aaa; font-size:0.8em; font-weight:bold; display:block; margin-bottom:5px;">Neue Tage hinzufügen</label>

                        <h:panelGroup rendered="#{empty athleteDetailController.missingDays}">
                            <div style="color:#666; font-style:italic; font-size:0.9em;">Alle Wochentage bereits vorhanden.</div>
                        </h:panelGroup>

                        <h:selectManyCheckbox value="#{athleteDetailController.selectedNewDays}"
                                              layout="pageDirection"
                                              styleClass="checkbox-list"
                                              rendered="#{not empty athleteDetailController.missingDays}">
                            <f:selectItems value="#{athleteDetailController.missingDays}" />
                        </h:selectManyCheckbox>
                    </div>

                    <div class="modal-actions">
                        <h:commandButton value="Abbrechen" action="#{athleteDetailController.cancelEdit()}" styleClass="btn-modal-cancel">
                            <f:ajax render=":editPlanModal" />
                        </h:commandButton>

                        <h:commandButton value="Speichern" action="#{athleteDetailController.savePlanChanges}" styleClass="btn-modal-save">
                            <f:ajax execute="@form" render=":editPlanModal :mainForm" />
                        </h:commandButton>
                    </div>
                </div>
            </h:form>
        </h:panelGroup>
    </h:panelGroup>

</h:body>
</html>
