<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core"
	  xmlns:ui="jakarta.faces.facelets">

<h:head>
	<title>Live Workout</title>
	<style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #ff9800; /* Auffälliges Orange für den Workout-Modus */
            margin: 0;
        }

        .exercise-card {
            background-color: #161616;
            border: 1px solid #333;
            border-left: 5px solid #4facfe; /* Blaue Markierung */
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exercise-info h3 {
            margin: 0 0 5px 0;
            color: #fff;
        }

        .exercise-stats {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-box {
            background-color: #2b2b2b;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 6px;
            width: 60px;
            text-align: center;
            font-size: 1.1em;
        }

        .btn-done {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-done:hover {
            background-color: #34ce57;
            transform: scale(1.05);
        }

        .btn-finish-workout {
            display: block;
            width: 100%;
            background-color: #dc3545;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            text-decoration: none;
            margin-top: 40px;
            border: none;
            cursor: pointer;
        }
	</style>
</h:head>

<h:body>
	<div class="container">

		<div class="header">
			<h:link outcome="planEditor" value="← Abbrechen" style="color: #888; text-decoration: none; float: left; margin-top: 5px;">
				<f:param name="planId" value="#{workoutSessionController.planId}" />
				<f:param name="dayId" value="#{workoutSessionController.trainingDay.id}" />
			</h:link>
			<h1>🔥 Live Workout</h1>
			<div style="color: #aaa; margin-top: 5px;">#{workoutSessionController.trainingDay.name}</div>
		</div>

		<h:form id="workoutForm">
			<ui:repeat value="#{workoutSessionController.pendingExercises}" var="pe">
				<div class="exercise-card">
					<div class="exercise-info">
						<h3>#{pe.exercise.name}</h3>
						<div class="exercise-stats">Ziel: #{pe.sets} Sätze x #{pe.reps} Wdh.</div>

						<div class="input-row">
							<h:inputText value="#{pe.sets}" styleClass="input-box" title="Sätze" />
							<h:inputText value="#{pe.reps}" styleClass="input-box" title="Wdh." />
							<h:inputText value="#{pe.weight}" styleClass="input-box" title="Kg" />
						</div>
					</div>

					<h:commandButton action="#{workoutSessionController.markAsDone(pe)}" value="✔️" styleClass="btn-done">
						<f:ajax execute="@form" render="@form" />
					</h:commandButton>
				</div>
			</ui:repeat>

			<h:panelGroup rendered="#{empty workoutSessionController.pendingExercises}">
				<div style="text-align: center; color: #28a745; font-size: 1.3em; font-weight: bold; margin-bottom: 20px;">
					🎉 Alles erledigt! Starkes Workout!
				</div>
			</h:panelGroup>

			<h:commandButton action="#{workoutSessionController.finishWorkout}" value="🏁 Workout beenden" styleClass="btn-finish-workout" />
		</h:form>
	</div>
</h:body>
</html>
