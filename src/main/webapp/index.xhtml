<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core"
	  xmlns:ui="jakarta.faces.facelets"
	  lang="de">
<h:head>
	<title>Dashboard - Smart Momo Gym</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<link rel="icon" type="image/png" href="#{resource['images/icon.png']}" />
	<link rel="apple-touch-icon" href="#{resource['images/icon.png']}" />
	<link rel="manifest" href="#{request.contextPath}/manifest.json?v=2" />

	<style>
        body {
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
        }

        h2, h3 {
            color: #ffffff;
            margin-top: 0;
        }

        /* Zentrierte Überschriften */
        h3 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.5em;
            color: #b0b0b0;
            font-weight: normal;
        }

        /* HEADER LAYOUT */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* HEADER BUTTONS */
        .btn-exercises {
            background-color: #17a2b8;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-exercises:hover { background-color: #20c9e2; }

        /* LOGOUT BUTTON */
        .btn-logout {
            background-color: transparent;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            padding: 9px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            display: inline-block;
        }
        .btn-logout:hover {
            background-color: #dc3545;
            color: white;
        }

        .logout-form {
            margin: 0;
        }

        /* NEU: MODERNE ATHLETEN-LISTE */
        .athlete-list {
            max-width: 450px; /* Schön schmal und elegant */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .athlete-card {
            background: linear-gradient(145deg, #1e1e1e, #222);
            border: 1px solid #333;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .athlete-card:hover {
            transform: translateY(-3px);
            border-color: #4facfe;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #222, #2a2a2a);
        }

        .athlete-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            text-decoration: none;
            color: #e0e0e0;
            width: 100%;
            box-sizing: border-box;
        }

        .athlete-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .athlete-avatar {
            font-size: 1.4em;
            background-color: #121212;
            border: 1px solid #444;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
        }

        .athlete-card:hover .athlete-avatar {
            border-color: #4facfe;
            color: #4facfe;
        }

        .athlete-name {
            font-weight: bold;
            font-size: 1.15em;
        }

        .badge-you {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #000;
            font-size: 0.65em;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(79, 172, 254, 0.3);
        }

        .arrow-icon {
            color: #555;
            font-size: 1.5em;
            transition: transform 0.2s, color 0.2s;
        }

        .athlete-card:hover .arrow-icon {
            color: #4facfe;
            transform: translateX(4px); /* Pfeil bewegt sich leicht nach rechts */
        }

        /* MOBILE REGELN */
        @media (max-width: 600px) {
            .header-container {
                flex-direction: column;
                gap: 15px;
                border-bottom: none;
            }
            .header-actions {
                flex-direction: column;
                width: 100%;
            }
            .btn-exercises, .btn-logout {
                width: 100%;
                text-align: center;
                box-sizing: border-box;
            }
            .logout-form {
                width: 100%;
            }
            .athlete-list {
                padding: 0 10px;
            }
        }
	</style>
</h:head>

<h:body>

	<div class="header-container">
		<div>
			<h2 style="margin:0; text-align: center;">Smart Momo Gym</h2>
		</div>

		<div class="header-actions">
			<h:link value="🏋️ Übungskatalog"
					outcome="exercises.xhtml"
					styleClass="btn-exercises" />

			<h:form styleClass="logout-form">
				<h:commandLink action="#{userSession.logout}"
							   value="🚪 Logout"
							   styleClass="btn-logout" />
			</h:form>
		</div>
	</div>

	<h3>Athleten</h3>

	<h:panelGroup rendered="#{empty dashboardController.allAthletes}">
		<p style="text-align: center; color: #888; font-style: italic;">Noch keine Athleten sichtbar.</p>
	</h:panelGroup>

	<h:panelGroup rendered="#{not empty dashboardController.allAthletes}" layout="block" styleClass="athlete-list">

		<ui:repeat value="#{dashboardController.allAthletes}" var="athlete">
			<div class="athlete-card">
				<h:link outcome="athleteDetail" styleClass="athlete-link">
					<f:param name="athleteId" value="#{athlete.id}" />

					<div class="athlete-info">
						<div class="athlete-avatar">👤</div>
						<div class="athlete-name">
							#{athlete.username}

							<h:panelGroup rendered="#{athlete.id == userSession.loggedInAthlete.id}">
								<span class="badge-you">Du</span>
							</h:panelGroup>
						</div>
					</div>

					<div class="arrow-icon">›</div>
				</h:link>
			</div>
		</ui:repeat>

	</h:panelGroup>

</h:body>
</html>
