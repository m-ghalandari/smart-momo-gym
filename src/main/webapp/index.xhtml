<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      lang="de">
<h:head>
    <title>Dashboard - Smart Momo Gym</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
        }

        h2, h3 {
            color: #ffffff;
            margin-top: 0;
        }

        /* Zentrierte Überschriften */
        h3 { text-align: center; }

        /* HEADER LAYOUT */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        /* HEADER BUTTONS */
        .btn-register {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-register:hover { background-color: #34ce57; }

        .btn-exercises {
            background-color: #17a2b8;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-exercises:hover { background-color: #20c9e2; }

        /* TABELLE */
        .athlete-table {
            width: 100%;
            max-width: 600px; /* Schön schmal */
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-left: auto;
            margin-right: auto;
        }

        .athlete-table th {
            background-color: #2c2c2c;
            color: #ffffff;
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #444;
        }

        .athlete-table td {
            padding: 15px;
            border-bottom: 1px solid #333;
            color: #cfcfcf;
            vertical-align: middle; /* Vertikal zentrieren */
        }

        .athlete-table tr:hover {
            background-color: #333333;
        }

        /* KLICKBARER NAME (Link Style) */
        .athlete-name-link {
            color: #e0e0e0; /* Fast Weiß */
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            display: block; /* Damit man die ganze Breite klicken kann */
        }
        .athlete-name-link:hover {
            color: #64b5f6; /* Blau beim Drüberfahren */
            text-decoration: none;
        }

        /* LÖSCHEN BUTTON (Icon Style) */
        .btn-icon-delete {
            color: #ff6b6b;
            background-color: transparent;
            border: 1px solid #ff6b6b;
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1.2em;
            line-height: 1;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn-icon-delete:hover {
            background-color: #dc3545; /* Hintergrund rot füllen */
            color: white;              /* Icon weiß */
            border-color: #dc3545;
            cursor: pointer;
        }

    </style>
</h:head>

<h:body>

    <div class="header-container">
        <div>
            <h2 style="margin:0;">Smart Momo Gym</h2>
        </div>

        <div class="header-actions">
            <h:link value="🏋️ Übungskatalog"
                    outcome="exercises.xhtml"
                    styleClass="btn-exercises" />

            <h:link value="+ Neuer Athlet"
                    outcome="register.xhtml"
                    styleClass="btn-register" />
        </div>
    </div>

    <h3>Alle Athleten</h3>

    <h:panelGroup rendered="#{empty dashboardController.allAthletes}">
        <p style="text-align: center; color: #888;">Noch keine Athleten registriert.</p>
    </h:panelGroup>

    <h:form id="dashboardForm" rendered="#{not empty dashboardController.allAthletes}">

        <h:dataTable value="#{dashboardController.allAthletes}" var="athlete"
                     styleClass="athlete-table">

            <h:column>
                <f:facet name="header">Name</f:facet>

                <h:link value="#{athlete.username}"
                        outcome="athleteDetail"
                        styleClass="athlete-name-link">
                    <f:param name="athleteId" value="#{athlete.id}" />
                </h:link>
            </h:column>

            <h:column>
                <f:facet name="header"></f:facet> <div style="text-align: right;">
                <h:commandLink action="#{dashboardController.deleteAthlete(athlete.id)}"
                               styleClass="btn-icon-delete"
                               title="Athlet löschen"
                               onclick="return confirm('Soll der Athlet #{athlete.username} wirklich gelöscht werden? Alle Pläne gehen verloren.');">
                    🗑️
                </h:commandLink>
            </div>
            </h:column>

        </h:dataTable>
    </h:form>

</h:body>
</html>
