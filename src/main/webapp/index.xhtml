<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core"
	  xmlns:ui="jakarta.faces.facelets"
	  lang="de">
<h:head>
	<title>Dashboard - Smart Momo Gym</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

	<link rel="icon" type="image/png" href="#{resource['images/icon.png']}" />
	<link rel="apple-touch-icon" href="#{resource['images/icon.png']}" />
	<link rel="manifest" href="#{request.contextPath}/manifest.json?v=2" />

	<h:outputStylesheet name="css/app.css" />

	<style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #050505;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BACKGROUND GLOWS --- */
        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
        }
        .glow-1 { top: -150px; left: -150px; }
        .glow-2 { bottom: -150px; right: -150px; }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* --- WELCOME HEADER AVATAR --- */
        .welcome-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-avatar-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .welcome-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #111;
            border: 2px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            transition: all 0.3s ease;
        }

        /* Wenn ein Bild da ist, leuchtet der Avatar blau */
        .welcome-avatar.has-image {
            border-color: #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
        }

        .gym-title {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #4facfe;
            font-weight: 900;
            margin-bottom: 10px;
            display: block;
        }

        h2 {
            font-size: 2.2em;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to bottom, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- QUICK ACTIONS --- */
        .header-actions {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .btn-glass {
            flex: 1;
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 800;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.95em;
        }

        .btn-primary-glass {
            background: rgba(79, 172, 254, 0.1);
            color: #4facfe;
            border-color: rgba(79, 172, 254, 0.2);
        }
        .btn-primary-glass:hover {
            background: rgba(79, 172, 254, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-danger-glass {
            background: rgba(255, 82, 82, 0.05);
            color: #ff5252;
            border-color: rgba(255, 82, 82, 0.1);
        }
        .btn-danger-glass:hover {
            background: rgba(255, 82, 82, 0.15);
            transform: translateY(-3px);
        }

        /* --- ATHLETE LIST --- */
        .section-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            font-weight: 800;
            margin-bottom: 20px;
            display: block;
        }

        .athlete-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .athlete-card {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 15px 20px; /* Leicht angepasst für Avatar */
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            animation: cardSlideIn 0.5s ease-out both;
        }

        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .athlete-card:hover {
            background: rgba(30, 30, 30, 0.8);
            border-color: #4facfe;
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .athlete-info {
            display: flex;
            align-items: center;
            gap: 18px;
            z-index: 2;
        }

        /* Avatar Box für die Liste */
        .athlete-avatar-box {
            width: 50px;
            height: 50px;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: all 0.3s ease;
            background-size: cover;
            background-position: center;
            color: #888;
        }

        .athlete-card:hover .athlete-avatar-box {
            border-color: #4facfe;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.2);
            color: #4facfe;
        }

        .athlete-avatar-box.has-image {
            border-color: rgba(79, 172, 254, 0.5); /* Subtiler blauer Rand für Bilder */
            color: transparent;
        }

        .athlete-name {
            font-weight: 700;
            font-size: 1.1em;
            color: #fff;
            text-decoration: none;
        }

        .athlete-link-overlay::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }

        .badge-me {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #050505;
            font-size: 0.65em;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 50px;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2;
        }

        .arrow-icon {
            color: #444;
            font-size: 1.2em;
            transition: 0.3s;
        }

        .athlete-card:hover .arrow-icon {
            color: #4facfe;
            transform: translateX(5px);
        }

        .btn-delete-admin {
            background: rgba(255, 82, 82, 0.1);
            color: #ff5252;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-delete-admin:hover { background: #ff5252; color: #fff; }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            border-radius: 24px;
            border: 1px dashed #333;
            color: #555;
            font-style: italic;
        }

        @media (max-width: 450px) {
            .header-actions { flex-direction: column; }
        }
	</style>
</h:head>

<h:body>
	<div class="bg-glow glow-1"></div>
	<div class="bg-glow glow-2"></div>

	<div class="container">

		<header class="welcome-section">
			<div class="welcome-avatar-wrapper">
				<h:panelGroup rendered="#{not empty userSession.loggedInAthlete.profilePictureBase64}">
					<div class="welcome-avatar has-image" style="background-image: url('#{userSession.loggedInAthlete.profilePictureBase64}');"></div>
				</h:panelGroup>
				<h:panelGroup rendered="#{empty userSession.loggedInAthlete.profilePictureBase64}">
					<div class="welcome-avatar">👤</div>
				</h:panelGroup>
			</div>

			<span class="gym-title">Smart Momo Gym</span>
			<h2>Willkommen, #{userSession.loggedInAthlete.username}</h2>
		</header>

		<nav class="header-actions">
			<h:link outcome="exercises.xhtml" styleClass="btn-glass btn-primary-glass">
				🏋️ Übungskatalog
			</h:link>

			<h:form style="flex: 1; display: flex;">
				<h:commandLink action="#{userSession.logout}" styleClass="btn-glass btn-danger-glass">
					🚪 Abmelden
				</h:commandLink>
			</h:form>
		</nav>

		<section class="content-area">
			<span class="section-label">Aktive Athleten</span>

			<h:panelGroup rendered="#{empty dashboardController.allAthletes}">
				<div class="empty-state">
					Keine Athleten online.
				</div>
			</h:panelGroup>

			<h:panelGroup rendered="#{not empty dashboardController.allAthletes}" layout="block" styleClass="athlete-list">
				<ui:repeat value="#{dashboardController.allAthletes}" var="athlete" varStatus="status">
					<div class="athlete-card" style="animation-delay: #{status.index * 0.1}s">
						<div class="athlete-info">

							<h:panelGroup rendered="#{not empty athlete.profilePictureBase64}">
								<div class="athlete-avatar-box has-image" style="background-image: url('#{athlete.profilePictureBase64}');"></div>
							</h:panelGroup>
							<h:panelGroup rendered="#{empty athlete.profilePictureBase64}">
								<div class="athlete-avatar-box">👤</div>
							</h:panelGroup>

							<div class="athlete-details">
								<h:link outcome="athleteDetail" styleClass="athlete-name athlete-link-overlay">
									<f:param name="athleteId" value="#{athlete.id}" />
									#{athlete.username}
								</h:link>
								<h:panelGroup rendered="#{athlete.id == userSession.loggedInAthlete.id}">
									<span class="badge-me">Du</span>
								</h:panelGroup>
							</div>
						</div>

						<div class="card-meta">
							<h:panelGroup rendered="#{userSession.loggedInAthlete.admin and athlete.id != userSession.loggedInAthlete.id}">
								<h:commandLink styleClass="btn-delete-admin"
											   onclick="openConfirmModal(#{athlete.id}, 'deleteAthleteCmd', 'Athlet entfernen?', 'Soll dieser User mitsamt allen Daten gelöscht werden?'); return false;">
									🗑️
								</h:commandLink>
							</h:panelGroup>
							<span class="arrow-icon">❯</span>
						</div>
					</div>
				</ui:repeat>
			</h:panelGroup>
		</section>

	</div>

	<h:form style="display: none;">
		<h:commandScript name="deleteAthleteCmd"
						 action="#{dashboardController.deleteAthlete(param.delId)}"
						 render="@all" />
	</h:form>

	<ui:include src="/WEB-INF/includes/confirmModal.xhtml" />
</h:body>
</html>
