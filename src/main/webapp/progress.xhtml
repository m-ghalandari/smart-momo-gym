<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core"
	  xmlns:ui="jakarta.faces.facelets">

<h:head>
	<title>Fortschritt</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

	<style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #050505;
            color: #f0f0f0;
            margin: 0;
            padding: 20px 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-circle {
            width: 44px;
            height: 44px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2em;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            background-color: rgba(255, 255, 255, 0.05);
            color: #f0f0f0;
        }
        .btn-circle:active { transform: scale(0.92); }
        .btn-circle:hover { background-color: rgba(255, 255, 255, 0.1); }

        .header-center {
            flex: 2;
            text-align: center;
        }

        .header-center h2 {
            margin: 0;
            font-size: 1.6em;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .header-sub {
            color: #888888;
            margin-top: 4px;
            font-size: 0.75em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- CARD  FORM --- */
        .card {
            background-color: #121212;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-label {
            font-size: 0.75em;
            color: #888888;
            margin-bottom: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        .dark-input {
            background-color: #0a0a0a;
            border: 1px solid #333;
            color: #ffffff;
            padding: 0 15px;
            min-height: 48px; /* Touch Target */
            border-radius: 12px;
            outline: none;
            width: 100%;
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            padding-right: 40px;
        }
        .dark-input:focus { border-color: #4facfe; }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center;
            color: #888888;
            padding: 40px 20px;
            background: #0a0a0a;
            border-radius: 16px;
            border: 1px dashed #333;
            font-style: italic;
            font-size: 0.9em;
            margin-top: 10px;
        }

        /* --- CHART.JS CONTAINER --- */
        .chart-container {
            position: relative;
            width: 100%;
            height: 45vh;
            min-height: 300px;
            margin-top: 15px;
        }

        /* --- MOBILE OPTIMIERUNG --- */
        @media (max-width: 600px) {
            .card { padding: 20px; border-radius: 20px; }
            .chart-container { height: 40vh; min-height: 250px; }
        }
	</style>
</h:head>

<h:body>
	<div class="container">
		<div class="header">
			<h:link outcome="planEditor" styleClass="btn-circle" title="Zurück">
				<f:param name="planId" value="#{progressController.planId}" />
				❮
			</h:link>

			<div class="header-center">
				<h2>📈 Fortschritt</h2>
				<div class="header-sub">#{progressController.trainingPlan.name}</div>
			</div>

			<div style="width: 44px;"></div> </div>

		<div class="card">
			<h:form id="progressForm">
				<h:outputLabel value="Übung auswählen" styleClass="form-label"/>

				<h:selectOneMenu value="#{progressController.selectedExerciseId}" styleClass="dark-input">
					<f:selectItem itemLabel="Bitte wählen..." itemValue="#{null}" />
					<f:selectItems value="#{progressController.planExercises}" var="ex" itemValue="#{ex.id}" itemLabel="#{ex.name}" />
					<f:ajax listener="#{progressController.loadChartData}" render="chartWrapper" />
				</h:selectOneMenu>

				<h:panelGroup id="chartWrapper" layout="block">

					<h:panelGroup rendered="#{not progressController.hasData and progressController.selectedExerciseId != null}">
						<div class="empty-state">
							Noch keine Trainingsdaten für diese Übung vorhanden. Mach ein Workout!
						</div>
					</h:panelGroup>

					<h:panelGroup rendered="#{progressController.hasData}">
						<div class="chart-container">
							<canvas id="progressChart"></canvas>
						</div>

						<script>
                            // Alten Graphen zerstören
                            if (window.myChart != null) {
                                window.myChart.destroy();
                            }
                            var ctx = document.getElementById('progressChart').getContext('2d');

                            // Neon-Glow Effekt für den Chart
                            let gradient = ctx.createLinearGradient(0, 0, 0, 400);
                            gradient.addColorStop(0, 'rgba(79, 172, 254, 0.4)');
                            gradient.addColorStop(1, 'rgba(79, 172, 254, 0.0)');

                            window.myChart = new Chart(ctx, {
                                type: 'line',
                                data: {
                                    labels: #{progressController.chartLabels},
                            datasets: [{
                                label: 'Gewicht (kg)',
                                data: #{progressController.chartData},
                            borderColor: '#4facfe',
                                backgroundColor: gradient,
                                borderWidth: 3,
                                tension: 0.4, // Smoother curve
                                pointBackgroundColor: '#ff9800', // Orange Workout Focus
                                pointBorderColor: '#121212', // Blend with card bg
                                pointBorderWidth: 2,
                                pointRadius: 6,
                                pointHoverRadius: 8,
                                fill: true
                            }]
                            },
                            options: {
                                responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                    legend: {
                                        display: false // Entfernt die unnötige Legende für mehr Platz
                                    },
                                    tooltip: {
                                        backgroundColor: 'rgba(15, 15, 15, 0.95)',
                                            titleColor: '#888',
                                            bodyColor: '#fff',
                                            bodyFont: { weight: 'bold', size: 14 },
                                        padding: 12,
                                            cornerRadius: 8,
                                            borderColor: '#333',
                                            borderWidth: 1
                                    }
                                },
                                scales: {
                                    x: {
                                        ticks: { color: '#888888', font: { weight: '600' } },
                                        grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }
                                    },
                                    y: {
                                        ticks: { color: '#888888', font: { weight: '600' } },
                                        grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
                                        beginAtZero: false
                                    }
                                },
                                interaction: {
                                    mode: 'index',
                                        intersect: false,
                                }
                            }
                            });
						</script>
					</h:panelGroup>

				</h:panelGroup>
			</h:form>
		</div>
	</div>
</h:body>
</html>
