<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core">

<h:head>
	<title>Neuen Plan erstellen</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

	<style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #050505;
            color: #f0f0f0;
            margin: 0;
            padding: 20px 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-circle {
            width: 44px;
            height: 44px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2em;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            background-color: rgba(255, 255, 255, 0.05);
            color: #f0f0f0;
        }
        .btn-circle:active { transform: scale(0.92); }
        .btn-circle:hover { background-color: rgba(255, 255, 255, 0.1); }

        .header-center {
            flex: 2;
            text-align: center;
        }

        .header-center h2 {
            margin: 0;
            font-size: 1.6em;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .header-sub {
            color: #888888;
            margin-top: 4px;
            font-size: 0.75em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .highlight { color: #4facfe; }

        /* --- CARD --- */
        .card {
            background-color: #121212;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- FORM ELEMENTS --- */
        .form-group { margin-bottom: 25px; }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 800;
            font-size: 0.75em;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .dark-input {
            width: 100%;
            padding: 0 15px;
            min-height: 48px; /* Touch Target Rule */
            background-color: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            font-size: 1em;
            color: #ffffff;
            box-sizing: border-box;
            transition: border-color 0.2s;
            outline: none;
        }
        .dark-input:focus { border-color: #4facfe; }

        /* --- DAY GRID (CHECKBOXES) --- */
        .checkbox-table {
            width: 100%;
            display: block;
        }
        .checkbox-table tbody {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }
        .checkbox-table tr { display: flex; width: 100%; }

        .checkbox-table td {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            min-height: 48px; /* Fat Finger Proof */
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
            padding: 0 5px;
        }
        .checkbox-table td:hover { border-color: #4facfe; background-color: rgba(79, 172, 254, 0.05); }

        .checkbox-table label {
            color: #f0f0f0;
            font-size: 0.85em;
            font-weight: 800;
            cursor: pointer;
            margin-left: 8px;
            white-space: nowrap;
        }

        .checkbox-table input[type="checkbox"] {
            accent-color: #4facfe;
            transform: scale(1.2);
            cursor: pointer;
            margin: 0;
        }

        /* --- PRO OLED TOGGLE SWITCH --- */
        .toggle-container {
            display: flex;
            align-items: center;
            background: #0a0a0a;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #333;
            justify-content: space-between;
        }

        .toggle-label {
            font-weight: 800;
            color: #f0f0f0;
            font-size: 0.9em;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- BUTTONS --- */
        .btn-submit {
            width: 100%;
            min-height: 56px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #050505;
            border: none;
            border-radius: 16px;
            font-size: 1.1em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.2);
            box-sizing: border-box;
        }
        .btn-submit:active { transform: scale(0.96); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4); }

        .error-box {
            background-color: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            list-style: none;
            font-weight: 800;
            font-size: 0.9em;
        }

        /* --- MOBILE OPTIMIERUNG --- */
        @media (max-width: 450px) {
            .checkbox-table tbody { grid-template-columns: 1fr 1fr; }
            .card { padding: 20px; border-radius: 20px; }
        }
	</style>
</h:head>

<h:body>
	<div class="container">

		<div class="header">
			<h:link outcome="athleteDetail" styleClass="btn-circle" title="Zurück">
				<f:param name="athleteId" value="#{planController.athleteId}"/>
				❮
			</h:link>

			<div class="header-center">
				<h2>Neuer Plan</h2>
				<h:panelGroup rendered="#{planController.athlete != null}" layout="block" styleClass="header-sub">
					für <span class="highlight">#{planController.athlete.username}</span>
				</h:panelGroup>
			</div>

			<div style="width: 44px;"></div> </div>

		<div class="card">
			<h:form>
				<h:messages globalOnly="true" styleClass="error-box" style="padding:0; margin:0;" />

				<div class="form-group">
					<h:outputLabel value="Bezeichnung" styleClass="form-label"/>
					<h:inputText value="#{planController.planName}"
								 required="true"
								 requiredMessage="Name fehlt."
								 styleClass="dark-input"
								 f:passThroughAttribute="placeholder"
								 f:passThroughValue="z.B. Push Pull Legs"/>
				</div>

				<div class="form-group">
					<h:outputLabel value="Tage auswählen" styleClass="form-label"/>
					<h:selectManyCheckbox value="#{planController.selectedDays}"
										  layout="pageDirection"
										  styleClass="checkbox-table">
						<f:selectItems value="#{planController.availableDays}"/>
					</h:selectManyCheckbox>
				</div>

				<div class="form-group" style="margin-bottom: 10px;">
					<h:outputLabel value="Optionen" styleClass="form-label"/>
					<div class="toggle-container">
						<span class="toggle-label">Sofort aktivieren</span>
						<label class="switch">
							<h:selectBooleanCheckbox value="#{planController.active}" />
							<span class="slider"></span>
						</label>
					</div>
				</div>

				<h:commandButton value="Speichern"
								 action="#{planController.save}"
								 styleClass="btn-submit"/>
			</h:form>
		</div>

	</div>
</h:body>
</html>
