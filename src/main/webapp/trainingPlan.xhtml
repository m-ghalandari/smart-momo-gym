<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core">

<h:head>
	<title>Neuen Plan erstellen</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<style>
        /* --- CORE SETTINGS --- */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Volle Höhe */
            margin: 0;
            padding: 15px; /* Etwas mehr Padding für Handys, damit die Box nicht am Rand klebt */
            box-sizing: border-box;
        }

        /* CARD DESIGN (Kompakter) */
        .card {
            background-color: #161616;
            padding: 25px; /* Reduziert von 40px */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #333;
            width: 100%;
            max-width: 420px; /* Etwas schmaler */
            box-sizing: border-box;
        }

        /* TYPOGRAPHY */
        h2 {
            text-align: center;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 2px; /* Weniger Abstand */
            font-size: 1.5em;   /* Etwas kleiner */
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px; /* Reduziert */
            font-size: 0.9em;
        }

        .highlight { color: #4facfe; font-weight: 600; }

        /* INPUT FIELDS */
        .form-group { margin-bottom: 15px; /* Deutlich reduziert von 25px */ }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.8em;
            color: #b0b0b0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 10px; /* Kleineres Padding */
            background-color: #212121;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: 15px;
            color: white;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: #4facfe;
            outline: none;
        }

        /* --- GRID STYLE FÜR TAGE (KOMPAKT) --- */
        .checkbox-table {
            width: 100%;
            display: block;
        }

        .checkbox-table tbody {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 3 SPALTEN für Desktop */
            gap: 6px; /* Engerer Abstand */
            width: 100%;
        }

        .checkbox-table tr { display: flex; width: 100%; }

        .checkbox-table td {
            display: flex;
            align-items: center;
            justify-content: center; /* Zentriert */
            background-color: #212121;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 8px 6px; /* Ein minimal höheres Padding für besseres Tippen */
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .checkbox-table td:hover {
            background-color: #2a2a2a;
            border-color: #555;
        }

        .checkbox-table label {
            color: #ccc;
            font-size: 0.85em; /* Kleinere Schrift */
            font-weight: 500;
            cursor: pointer;
            margin-left: 5px;
            white-space: nowrap; /* Kein Umbruch */
        }

        .checkbox-table input[type="checkbox"] {
            accent-color: #4facfe;
            transform: scale(1.1);
            cursor: pointer;
            margin: 0;
        }

        /* TOGGLE SWITCH (Kompakter) */
        .toggle-container {
            display: flex;
            align-items: center;
            background: #212121;
            padding: 8px 12px; /* Flacher */
            border-radius: 6px;
            border: 1px solid #333;
            justify-content: space-between;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px; /* Kleiner */
            height: 22px; /* Kleiner */
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px; /* Kleiner */
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(18px); }

        /* BUTTONS */
        .btn-submit {
            width: 100%;
            padding: 14px; /* Etwas höher für Handys */
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            box-sizing: border-box;
        }

        .btn-submit:hover { transform: translateY(-1px); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
            font-size: 0.85em;
        }
        .back-link:hover { color: #fff; }

        .error-box {
            background-color: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            list-style: none;
            font-size: 0.9em;
        }

        /* --- MOBILE OPTIMIERUNG --- */
        @media (max-width: 400px) {
            .checkbox-table tbody {
                /* Wenn der Bildschirm sehr schmal wird, wechseln wir auf 2 Spalten, damit die Wörter (Donnerstag etc.) nicht gequetscht werden */
                grid-template-columns: 1fr 1fr;
            }
            .card {
                padding: 20px;
            }
        }
	</style>
</h:head>

<h:body>
	<div class="card">
		<h2>Neuer Plan</h2>

		<div class="subtitle">
			<h:panelGroup rendered="#{planController.athlete != null}">
				für <span class="highlight">#{planController.athlete.username}</span>
			</h:panelGroup>
		</div>

		<h:form>
			<h:messages globalOnly="true" styleClass="error-box" style="padding:0; margin:0;" />

			<div class="form-group">
				<h:outputLabel value="Bezeichnung" styleClass="form-label"/>
				<h:inputText value="#{planController.planName}"
							 required="true"
							 requiredMessage="Name fehlt."
							 styleClass="form-input"
							 f:passThroughAttribute="placeholder"
							 f:passThroughValue="z.B. Push Pull Legs"/>
			</div>

			<div class="form-group">
				<h:outputLabel value="Tage auswählen" styleClass="form-label"/>

				<h:selectManyCheckbox value="#{planController.selectedDays}"
									  layout="pageDirection"
									  styleClass="checkbox-table">
					<f:selectItems value="#{planController.availableDays}"/>
				</h:selectManyCheckbox>
			</div>

			<div class="form-group">
				<h:outputLabel value="Optionen" styleClass="form-label"/>

				<div class="toggle-container">
					<span style="font-weight: 500; color: #ccc; font-size: 0.9em;">Sofort aktivieren</span>
					<label class="switch">
						<h:selectBooleanCheckbox value="#{planController.active}" />
						<span class="slider"></span>
					</label>
				</div>
			</div>

			<h:commandButton value="Speichern"
							 action="#{planController.save}"
							 styleClass="btn-submit"/>

			<h:link value="Abbrechen" outcome="athleteDetail" styleClass="back-link">
				<f:param name="athleteId" value="#{planController.athleteId}"/>
			</h:link>

		</h:form>
	</div>
</h:body>
</html>
