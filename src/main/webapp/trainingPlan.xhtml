<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core"
	  xmlns:ui="jakarta.faces.facelets"
	  lang="de">

<h:head>
	<title>Neuen Plan erstellen - Smart Momo Gym</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<link rel="manifest" href="#{request.contextPath}/manifest.json?v=2" />
	<h:outputStylesheet name="css/app.css" />

	<style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #050505;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* --- BACKGROUND GLOWS --- */
        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
        }
        .glow-1 { top: -100px; right: -100px; }
        .glow-2 { bottom: -100px; left: -100px; }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px 20px 80px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 35px;
            animation: fadeInDown 0.5s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-circle {
            width: 44px;
            height: 44px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2em;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f0f0f0;
        }
        .btn-circle:active { transform: scale(0.92); }
        .btn-circle:hover { background: rgba(255, 255, 255, 0.1); border-color: #4facfe; }

        .header-center {
            flex: 2;
            text-align: center;
        }

        .header-center h2 {
            margin: 0;
            font-size: 1.8em;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff, #aaaaaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .header-sub {
            color: #888888;
            margin-top: 4px;
            font-size: 0.8em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .highlight { color: #4facfe; }

        /* --- GLASS CARD --- */
        .glass-card {
            background: rgba(18, 18, 18, 0.7);
            padding: 35px 25px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            width: 100%;
            box-sizing: border-box;
            animation: cardEntrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- FORM ELEMENTS --- */
        .form-group { margin-bottom: 25px; }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 800;
            font-size: 0.75em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-left: 5px;
        }

        .dark-input {
            width: 100%;
            padding: 18px;
            background-color: rgba(5, 5, 5, 0.6);
            border: 1px solid #222;
            border-radius: 18px;
            font-size: 1em;
            color: #ffffff;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
        }
        .dark-input:focus {
            border-color: #4facfe;
            background-color: #000;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.1);
        }

        /* --- DAY GRID (CHECKBOXES) --- */
        .checkbox-table {
            width: 100%;
            display: block;
        }
        .checkbox-table tbody {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
        }

        /* Macht die TRs unsichtbar für das Grid, damit TDs direkte Grid-Kinder werden */
        .checkbox-table tr { display: contents; }

        .checkbox-table td {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(5, 5, 5, 0.6);
            border: 1px solid #222;
            border-radius: 16px;
            padding: 15px 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .checkbox-table td:hover {
            border-color: #4facfe;
            background-color: rgba(79, 172, 254, 0.05);
            transform: translateY(-2px);
        }

        .checkbox-table label {
            color: #f0f0f0;
            font-size: 0.85em;
            font-weight: 800;
            cursor: pointer;
            margin-left: 8px;
        }

        .checkbox-table input[type="checkbox"] {
            accent-color: #4facfe;
            transform: scale(1.3);
            cursor: pointer;
            margin: 0;
        }

        /* --- PRO OLED TOGGLE SWITCH --- */
        .toggle-container {
            display: flex;
            align-items: center;
            background: rgba(5, 5, 5, 0.6);
            padding: 15px 20px;
            border-radius: 18px;
            border: 1px solid #222;
            justify-content: space-between;
        }

        .toggle-label {
            font-weight: 800;
            color: #f0f0f0;
            font-size: 0.9em;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        input:checked + .slider { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* --- SUBMIT BUTTON --- */
        .btn-submit {
            width: 100%;
            min-height: 58px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #050505;
            border: none;
            border-radius: 18px;
            font-size: 1.1em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 30px rgba(79, 172, 254, 0.3);
        }
        .btn-submit:active { transform: scale(0.97); }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(79, 172, 254, 0.5);
        }

        /* --- ERROR BOX --- */
        .error-box {
            background-color: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.2);
            color: #ff5252;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 25px;
            text-align: center;
            list-style: none;
            font-weight: 800;
            font-size: 0.85em;
        }

        /* --- MOBILE OPTIMIERUNG --- */
        @media (max-width: 450px) {
            .checkbox-table tbody { grid-template-columns: 1fr 1fr; }
            .glass-card { padding: 30px 20px; }
        }
	</style>
</h:head>

<h:body>
	<div class="bg-glow glow-1"></div>
	<div class="bg-glow glow-2"></div>

	<div class="container">

		<div class="header">
			<h:link outcome="athleteDetail" styleClass="btn-circle" title="Zurück">
				<f:param name="athleteId" value="#{planController.athleteId}"/>
				❮
			</h:link>

			<div class="header-center">
				<h2>Neuer Plan</h2>
				<h:panelGroup rendered="#{planController.athlete != null}" layout="block" styleClass="header-sub">
					für <span class="highlight">#{planController.athlete.username}</span>
				</h:panelGroup>
			</div>

			<div style="width: 44px;"></div>
		</div>

		<div class="glass-card">
			<h:form>
				<h:messages globalOnly="true" styleClass="error-box" style="padding:0; margin:0;" />

				<div class="form-group tour-name-step">
					<h:outputLabel value="Bezeichnung" styleClass="form-label"/>
					<h:inputText value="#{planController.planName}"
								 required="true"
								 requiredMessage="Bitte eine Bezeichnung eingeben."
								 styleClass="dark-input" />
				</div>

				<div class="form-group tour-days-step">
					<h:outputLabel value="Tage auswählen" styleClass="form-label"/>
					<h:selectManyCheckbox value="#{planController.selectedDays}"
										  layout="pageDirection"
										  styleClass="checkbox-table">
						<f:selectItems value="#{planController.availableDays}"/>
					</h:selectManyCheckbox>
				</div>

				<div class="form-group tour-activate-step" style="margin-bottom: 15px;">
					<h:outputLabel value="Optionen" styleClass="form-label"/>
					<div class="toggle-container">
						<span class="toggle-label">Sofort aktivieren</span>
						<label class="switch">
							<h:selectBooleanCheckbox value="#{planController.active}" />
							<span class="slider"></span>
						</label>
					</div>
				</div>

				<h:commandButton value="Plan Erstellen"
								 action="#{planController.save}"
								 styleClass="btn-submit tour-submit-step"/>
			</h:form>
		</div>

	</div>

	<script>
        // <![CDATA[
        const pageTourSteps = [
            {
                element: '.tour-name-step',
                popover: {
                    title: 'Gib deinem Plan einen Namen',
                    description: 'Wie soll dein neuer Trainingsplan heißen? Beliebte Namen sind z.B. "Push Pull Legs", "Ganzkörper" oder "Sommer-Shred".',
                    side: "bottom",
                    align: 'center'
                }
            },
            {
                element: '.tour-days-step',
                popover: {
                    title: 'Strukturiere deine Woche',
                    description: 'Wähle aus, an welchen Tagen dieser Plan trainiert wird. Du kannst diese Auswahl später nicht mehr ändern, aber die Übungen an den Tagen bleiben völlig flexibel!',
                    side: "top",
                    align: 'center'
                }
            },
            {
                element: '.tour-activate-step',
                popover: {
                    title: 'Direkt durchstarten?',
                    description: 'Wenn du diesen Plan sofort zu deinem aktuellen Haupt-Plan machen willst, aktiviere diesen Schalter. Du kannst das aber auch später in deinem Profil tun.',
                    side: "top",
                    align: 'center'
                }
            },
            {
                element: '.tour-submit-step',
                popover: {
                    title: 'Erstellen',
                    description: 'Klicke hier, um den leeren Plan zu generieren. Danach landest du direkt im Editor und kannst ihn mit deinen Lieblingsübungen füllen!',
                    side: "top",
                    align: 'center'
                }
            }
        ];
        // ]]>
	</script>

	<ui:include src="/WEB-INF/includes/helpWidget.xhtml" />

</h:body>
</html>
