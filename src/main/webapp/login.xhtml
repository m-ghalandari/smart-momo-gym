<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="jakarta.faces.html"
	  xmlns:f="jakarta.faces.core"
	  xmlns:ui="jakarta.faces.facelets">

<h:head>
	<title>Login - Smart Momo Gym</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<link rel="manifest" href="#{request.contextPath}/manifest.json?v=2" />
	<meta name="theme-color" content="#050505" />

	<style>
        /* --- GLOBAL THEME --- */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #050505;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- BACKGROUND SHAPES (Deko) --- */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; animation: pulse 8s infinite alternate; }

        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

        .main-content {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
        }

        /* --- LOGO FRAME (Der Rahmen) --- */
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: -50px;
            position: relative;
            z-index: 10;
        }

        .logo-frame {
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid rgba(79, 172, 254, 0.5);
            padding: 10px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.3), inset 0 0 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .gym-logo {
            display: block;
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 20px;
        }

        /* --- LOGIN CARD --- */
        .login-card {
            background: rgba(18, 18, 18, 0.7);
            padding: 70px 35px 40px 35px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: cardEntrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h2 {
            font-size: 1.8em;
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 0.75em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding-left: 5px;
        }

        /* --- INPUTS --- */
        .form-input {
            width: 100%;
            padding: 18px;
            background-color: rgba(5, 5, 5, 0.6);
            border: 1px solid #222;
            border-radius: 18px;
            font-size: 1em;
            color: #ffffff;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #4facfe;
            background-color: #000;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.1);
        }

        /* --- SUBMIT BUTTON --- */
        .btn-submit {
            width: 100%;
            min-height: 58px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #050505;
            border: none;
            border-radius: 18px;
            font-size: 1.1em;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 15px 30px rgba(79, 172, 254, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(79, 172, 254, 0.5);
        }

        .btn-submit:active { transform: scale(0.97); }

        .link-text {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #555;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 700;
            transition: color 0.2s;
        }
        .link-text:hover { color: #f0f0f0; }

        .global-messages { list-style: none; padding: 0; margin-bottom: 20px; }
        .global-messages li {
            color: #ff5252;
            background: rgba(255, 82, 82, 0.1);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85em;
            text-align: center;
            border: 1px solid rgba(255, 82, 82, 0.2);
        }
	</style>
</h:head>

<h:body>
	<f:view transient="true">

		<div class="bg-glow glow-1"></div>
		<div class="bg-glow glow-2"></div>

		<div class="main-content">
			<div class="logo-container">
				<div class="logo-frame">
					<h:graphicImage name="images/logo.png" styleClass="gym-logo" alt="Logo" />
				</div>
			</div>

			<div class="login-card">
				<h2>MOMO GYM</h2>

				<h:form>
					<h:messages globalOnly="true" styleClass="global-messages" />

					<div class="form-group">
						<h:outputLabel for="usernameInput" value="Benutzername" styleClass="form-label" />
						<h:inputText id="usernameInput" value="#{loginController.username}" required="true" styleClass="form-input" autocomplete="username"/>
					</div>

					<div class="form-group">
						<h:outputLabel for="passwordInput" value="Passwort" styleClass="form-label" />
						<h:inputSecret id="passwordInput" value="#{loginController.password}" required="true" styleClass="form-input" autocomplete="current-password"/>
					</div>

					<h:commandButton value="Login" action="#{loginController.login}" styleClass="btn-submit" />

					<h:link value="NEUEN ACCOUNT ERSTELLEN" outcome="register.xhtml" styleClass="link-text" />
				</h:form>
			</div>
		</div>
		<script>
            // <![CDATA[
            const pageTourSteps = [
                {
                    element: '.link-text',
                    popover: {
                        title: 'Neu hier?',
                        description: 'Willkommen bei Smart Momo Gym! Wenn du noch keinen Account hast, klicke hier, um dich kostenlos zu registrieren und direkt loszulegen.',
                        side: "top",
                        align: 'center'
                    },
                    onHighlightStarted: (element) => {
                        element.style.background = '#ffffff';
                        element.style.color = '#050505';
                        element.style.padding = '10px 20px';
                        element.style.borderRadius = '12px';
                        element.style.boxShadow = '0 0 20px rgba(255, 255, 255, 0.5)';
                    },
                    onDeselected: (element) => {
                        element.style.background = 'transparent';
                        element.style.color = '#555';
                        element.style.padding = '0';
                        element.style.boxShadow = 'none';
                    }
                }
            ];
            // ]]>
		</script>
		<ui:include src="/WEB-INF/includes/helpWidget.xhtml" />
	</f:view>
</h:body>
</html>
